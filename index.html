<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#3b82f6"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="휴가관리"><title>🏖️ 휴가 관리</title><script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script><style>:root{--bg:#f4f5f7;--card:#fff;--border:#e5e7eb;--blue:#3b82f6;--blue-l:#eff6ff;--green:#10b981;--orange:#f59e0b;--red:#ef4444;--pink:#ec4899;--pink-l:#fdf2f8;--text:#111827;--t2:#6b7280;--t3:#9ca3af;--r:13px;--rs:8px;--sh:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,'Apple SD Gothic Neo',BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}.wrap{max-width:800px;margin:0 auto;padding:20px 16px 40px}.ibanner{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:13px}.ibanner b{display:block;font-size:14px;margin-bottom:2px}.ibanner .sub{font-size:11px;opacity:.85;margin-top:2px}.iclose{border:none;background:rgba(255,255,255,.2);color:#fff;border-radius:99px;width:28px;height:28px;cursor:pointer;font-size:16px;flex-shrink:0}.hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}.hd-t{font-size:22px;font-weight:800;letter-spacing:-.3px}.hd-s{font-size:12px;color:var(--t2);margin-top:3px}.hd-r{display:flex;align-items:center;gap:6px}.ynav{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;box-shadow:var(--sh)}.ynav button{border:none;background:none;padding:8px 13px;cursor:pointer;font-size:18px;c -rs) 0;padding:10px 14px;font-size:12px;color:#92400e;margin-bottom:14px}.bday-banner{background:linear-gradient(135deg,var(--pink-l),#fdf4ff);border:1px solid #fbcfe8;border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}.bday-l{display:flex;align-items:center;gap:10px}.bday-icon{font-size:28px}.bday-title{font-weight:700;color:#9d174d;font-size:13px;margin-bottom:1px}.bday-sub{font-size:11px;color:var(--pink)}.bday-chip{background:var(--pink-l);border:1px solid #fbcfe8;border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;color:#9d174d;white-space:nowrap}.setup-card{background:var(--card);border-radius:var(--r);padding:44px 24px;text-align:center;box-shadow:var(--sh);margin-bottom:14px}.si{font-size:52px;margin-bottom:14px}.st{font-size:18px;font-weight:800;margin-bottom:8px}.sd{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.6}.ovl{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:999;padding:0}@media(min-width:500px){.ovl{align-items:center;padding:16px}}.modal{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-width:460px;max-height:92vh;overflow-y:auto}@media(min-width:500px){.modal{border-radius:18px}}.mhd{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0}.mht{font-size:17px;font-weight:800}.close-btn{border:none;background:#f3f4f6;border-radius:99px;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--t2)}.mbody{padding:20px}.fg{margin-bottom:14px}.fg label{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:6px;letter-spacing:.4px;text-transform:uppercase}.fc{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:14px;color:var(--text);background:var(--card);outline:none;-webkit-appearance:none;appearance:none;font-family:inherit}.fc:focus{border-color:var(--blue)}textarea.fc{resize:vertical;min-height:60px}.date-row{display:flex;align-items:center;gap:6px}.date-row .fc{text-align:center;padding:10px 6px}.date-sep{color:var(--t2);font-size:18px;font-weight:300;flex-shrink:0}.rgrp{display:flex;gap:6px;flex-wrap:wrap}.ropt{flex:1;min-width:80px;padding:9px 8px;border:1.5px solid var(--border);border-radius:var(--rs);text-align:center;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;user-select:none}.ropt.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}.ropt:hover:not(.on){background:#f9fafb}.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}.tprev{font-size:12px;color:var(--blue);padding:5px 0;font-weight:500;min-height:22px}.tprev.warn{color:var(--red)}.fact{display:flex;gap:8px;margin-top:16px;padding-bottom:env(safe-area-inset-bottom)}.btn-cancel{flex:1;padding:11px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--card);font-size:14px;font-weight:600;cursor:pointer;color:var(--t2)}.btn-submit{flex:2;padding:11px;border:none;border-radius:var(--rs);background:var(--blue);color:#fff;font-size:14px;font-weight:700;cursor:pointer}.btn-submit:hover{background:#2563eb}.snote{font-size:12px;color:var(--t2);margin-top:6px;line-height:1.6}.over-warn{font-size:11px;color:var(--red);font-weight:500}.data-btn{width:100%;padding:11px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;text-align:left;margin-bottom:6px}.import-status{padding:10px 12px;border-radius:var(--rs);font-size:13px;font-weight:600;margin-bottom:6px}.mobile-memo{display:none;font-size:11px;color:var(--t2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.mobile-hint{display:none;font-size:11px;color:var(--t3);padding:10px 14px;border-top:1px solid var(--border);text-align:center}@media(max-width:500px){.cards{grid-template-columns:repeat(3,1fr)}.card{padding:12px 10px}.c-val{font-size:20px}.c-sub{font-size:10px}.c-lbl{font-size:10px}.frow{grid-template-columns:1fr}.pr{flex-wrap:nowrap;align-items:center}.pn{white-space:nowrap;flex-shrink:0;font-size:11px}.pl{font-size:12px}.tbl th:nth-child(4),.tbl td:nth-child(4){display:none}.tbl th:nth-child(5),.tbl td:nth-child(5){display:none}.tbl td,.tbl th{padding:8px 8px;font-size:12px}.ld{font-size:12px}.edit-btn{display:none}.del-btn{padding:3px 5px;font-size:12px}.mobile-memo{display:block}.mobile-hint{display:block}}@media(max-width:360px){.cards{grid-template-columns:repeat(2,1fr)}.tbl td,.tbl th{padding:7px 6px;font-size:11px}}</style></head><body><div id="ibanner" style="display:none" class="ibanner"><div><b>📲 홈 화면에 추가하면 앱처럼 사용할 수 있어요!</b><div class="sub" id="isub"></div></div><button class="iclose" onclick="document.getElementById('ibanner').style.display='none'">✕</button></div><div class="wrap" id="root"></div><script>/* ── PWA ── */(function(){const m={name:'🏖️ 휴가 관리',short_name:'휴가관리',start_url:'./index.html',display:'standalone',background_color:'#f4f5f7',theme_color:'#3b82f6',icons:[{src:`data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%233b82f6'/><text y='78' x='12' font-size='72'>🏖️</text></svg>`,sizes:'512x512',type:'image/svg+xml'}]};try{const b=new Blob([JSON.stringify(m)],{type:'application/json'});const l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(b);document.head.appendChild(l);}catch(e){}if(!window.matchMedia('(display-mode:standalone)').matches&&!window.navigator.standalone){const b=document.getElementById('ibanner'),s=document.getElementById('isub');if(/iPhone|iPad/.test(navigator.userAgent))s.textContent='Safari → 공유버튼 → 홈 화면에 추가';else if(/Android/.test(navigator.userAgent))s.textContent='Chrome → ⋮ → 홈 화면에 추가';else s.textContent='주소창 옆 설치 아이콘 클릭';if(b)b.style.display='flex'}})();/* ── 상태 ── */const WH=8;let S={joinDate:'',birthday:'',year:new Date().getFullYear()};let entries=[];let ui={showForm:false,showSettings:false,importStatus:{loading:false,msg:'',error:false}};let form={};/* ── 저장 ── */function saveS(){try{localStorage.setItem('hvac_s',JSON.stringify(S))}catch(e){}}function saveE(){try{localStorage.setItem('hvac_e',JSON.stringify(entries))}catch(e){}}function load(){try{const r=localStorage.getItem('hvac_s');if(r)Object.assign(S,JSON.parse(r))}catch(e){}try{const r=localStorage.getItem('hvac_e');if(r)entries=JSON.parse(r)}catch(e){}render()}/* ── 계산 ── */function nyuncha(yr){if(!S.joinDate)return 1;const j=new Date(S.joinDate);let y=yr-j.getFullYear();return Math.max(1,y+1)}function lsBonus(nc){return nc<=3?nc:3+Math.ceil((nc-3)/2)}function vacInfo(yr){const bday=S.birthday?1:0;if(!S.joinDate)return{nc:1,ls:0,annual:12,summer:3,birthday:bday,total:15+bday,isProRated:false,isBeforeJoin:false};const join=new Date(S.joinDate);const joinYr=join.getFullYear();if(yr<joinYr){return{nc:0,ls:0,annual:0,summer:0,birthday:0,total:0,isProRated:false,isBeforeJoin:true}}const nc=nyuncha(yr);if(joinYr===yr){const joinMonth=join.getMonth()+1;const monthsWorked=13-joinMonth;const annual=monthsWorked;const summer=Math.round(3*monthsWorked/12*10)/10;return{nc,ls:0,annual,summer,birthday:bday,total:annual+summer+bday,isProRated:true,monthsWorked,isBeforeJoin:false}}const ls=lsBonus(nc);const annual=12+ls;return{nc,ls,annual,summer:3,birthday:bday,total:annual+3+bday,isProRated:false,isBeforeJoin:false}}function getBdayDate(yr){if(!S.birthday)return null;const[,mm,dd]=S.birthday.split('-');return`${yr}-${mm}-${dd}`}function isBdayMonth(yr){if(!S.birthday)return false;const today=new Date(),m=parseInt(S.birthday.split('-')[1])-1;return today.getFullYear()===yr&&today.getMonth()===m}function yearEntries(){return entries.filter(e=>new Date(e.date).getFullYear()===S.year)}function isCounted(e){if(!e.status||e.status==='완료')return true;const t=new Date();t.setHours(0,0,0,0);return new Date(e.date)<=t}function isPending(e){return e.status==='예정'&&!isCounted(e)}function usedHours()
